<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pengajuan Barang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8 min-h-screen">

    <div class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-slate-200">
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Form Pengajuan Barang</h2>
            <p class="text-slate-500 text-sm mt-1">Silakan isi detail pengajuan request kamu di bawah ini.</p>
        </div>
        
        <form id="requestForm" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Requester</label>
                    <input type="text" id="requester" required placeholder="Contoh: Budi Santoso" class="block w-full rounded-lg border-slate-300 bg-slate-50 p-2.5 border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Area / Divisi</label>
                    <select id="area" required class="block w-full rounded-lg border-slate-300 bg-slate-50 p-2.5 border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all cursor-pointer">
                        <option value="" disabled selected>Memuat daftar divisi...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Tanggal Request</label>
                    <input type="date" id="tglReq" required class="block w-full rounded-lg border-slate-300 bg-slate-50 p-2.5 border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Tanggal Dibutuhkan</label>
                    <input type="date" id="tglButuh" required class="block w-full rounded-lg border-slate-300 bg-slate-50 p-2.5 border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Bukti Gambar / Referensi (Opsional)</label>
                    <input type="file" id="imageFile" accept="image/*" class="block w-full p-2 border border-slate-300 rounded-lg bg-slate-50 text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all">
                </div>
            </div>

            <hr class="border-slate-200">

            <div>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-slate-800">Daftar Barang</h3>
                    <button type="button" onclick="tambahBarang()" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-semibold px-4 py-2 rounded-lg text-sm transition-colors flex items-center gap-1">
                        <span>+</span> Tambah Barang
                    </button>
                </div>

                <div id="containerBarang" class="space-y-3">
                    <div class="item-row grid grid-cols-1 md:grid-cols-12 gap-3 bg-white p-4 rounded-lg border border-slate-200 shadow-sm relative group">
                        <div class="md:col-span-9">
                            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wide mb-1">Nama Barang</label>
                            <input type="text" class="nama-barang block w-full rounded-md border-slate-300 bg-slate-50 p-2 border focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Contoh: Kertas A4" required>
                        </div>
                        <div class="md:col-span-3">
                            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wide mb-1">Qty</label>
                            <input type="number" min="1" class="qty block w-full rounded-md border-slate-300 bg-slate-50 p-2 border focus:ring-2 focus:ring-blue-500 outline-none" placeholder="10" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-6">
                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-lg shadow-sm transition-colors text-lg">
                    Kirim Pengajuan
                </button>
            </div>
        </form>
    </div>

    <script>
        // MASUKKAN URL APLIKASI WEB KAMU DI SINI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnDCjJMFOx5RA8XSA_VLigDlJFl7Io5l4b5uO00QsoZUHCkLDDQJ4mT7hybVDG1C0P5g/exec';

        // Mengambil daftar Divisi dari Google Sheets
        async function loadDivisi() {
            const areaSelect = document.getElementById('area');
            try {
                const response = await fetch(SCRIPT_URL + "?action=getDivisi");
                const divisiList = await response.json();
                
                areaSelect.innerHTML = '<option value="" disabled selected>-- Pilih Divisi Kamu --</option>';
                
                divisiList.forEach(divisi => {
                    const option = document.createElement('option');
                    option.value = divisi;
                    option.textContent = divisi;
                    areaSelect.appendChild(option);
                });
            } catch (error) {
                console.error("Gagal mengambil data divisi:", error);
                areaSelect.innerHTML = '<option value="" disabled selected>Gagal memuat divisi. Coba muat ulang halaman.</option>';
            }
        }
        
        loadDivisi();

        function tambahBarang() {
            const container = document.getElementById('containerBarang');
            const rowHTML = `
                <div class="item-row grid grid-cols-1 md:grid-cols-12 gap-3 bg-white p-4 rounded-lg border border-slate-200 shadow-sm relative group pr-10">
                    <button type="button" onclick="this.parentElement.remove()" class="absolute top-1/2 -translate-y-1/2 right-3 text-red-400 hover:text-red-600 font-bold p-1 rounded-md bg-red-50 hover:bg-red-100 transition-colors" title="Hapus baris">✕</button>
                    <div class="md:col-span-9">
                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wide mb-1">Nama Barang</label>
                        <input type="text" class="nama-barang block w-full rounded-md border-slate-300 bg-slate-50 p-2 border focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wide mb-1">Qty</label>
                        <input type="number" min="1" class="qty block w-full rounded-md border-slate-300 bg-slate-50 p-2 border focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', rowHTML);
        }

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                if (!file) { resolve(null); return; }
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({
                    base64: reader.result.split(',')[1],
                    name: file.name,
                    type: file.type
                });
                reader.onerror = error => reject(error);
            });
        }

        document.getElementById('requestForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerText = 'Mengirim Pengajuan...';
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                const fileInput = document.getElementById('imageFile').files[0];
                const imageObj = await getBase64(fileInput);

                let itemsArray = [];
                const itemRows = document.querySelectorAll('.item-row');
                itemRows.forEach(row => {
                    itemsArray.push({
                        namaBarang: row.querySelector('.nama-barang').value,
                        qty: row.querySelector('.qty').value,
                        harga: "-",
                        vendor: "-"
                    });
                });

                const payload = {
                    requester: document.getElementById('requester').value,
                    area: document.getElementById('area').value,
                    tglReq: document.getElementById('tglReq').value,
                    tglButuh: document.getElementById('tglButuh').value,
                    items: itemsArray,
                    imageFile: imageObj ? imageObj.base64 : null,
                    imageName: imageObj ? imageObj.name : null,
                    imageType: imageObj ? imageObj.type : null
                };

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                
                if(result.status === "sukses") {
                    // SweetAlert Sukses
                    Swal.fire({
                        title: 'Berhasil!',
                        text: 'Tiket pengajuan kamu terbuat dengan ID: ' + result.ticketId,
                        icon: 'success',
                        confirmButtonColor: '#2563eb', // Warna biru Tailwind
                        confirmButtonText: 'Tutup'
                    });
                    
                    document.getElementById('requestForm').reset();
                    loadDivisi(); 
                } else {
                    // SweetAlert Gagal dari Server
                    Swal.fire({
                        title: 'Gagal!',
                        text: 'Terjadi kesalahan sistem saat mengirim data.',
                        icon: 'error',
                        confirmButtonColor: '#ef4444' // Warna merah Tailwind
                    });
                }

            } catch (error) {
                console.error("Error:", error);
                // SweetAlert Error Jaringan
                Swal.fire({
                    title: 'Koneksi Terputus',
                    text: 'Gagal menghubungi server. Pastikan koneksi internet stabil.',
                    icon: 'warning',
                    confirmButtonColor: '#f59e0b' // Warna kuning Tailwind
                });
            } finally {
                btnSubmit.innerText = 'Kirim Pengajuan';
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
