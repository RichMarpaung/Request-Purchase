<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Manajemen Request</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Admin Dashboard</h1>
                <p class="text-slate-500 mt-1 text-sm">Kelola harga, vendor, status, estimasi, dan validitas tiket.</p>
            </div>
            <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow-sm text-sm font-medium transition-colors flex items-center gap-2">
                <span>🔄</span> Segarkan Data
            </button>
        </div>

        <div class="mb-8 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="text-slate-400">🔍</span>
            </div>
            <input type="text" id="searchInput" placeholder="Cari ID Tiket, Nama Requester..." 
                class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-sm shadow-sm transition-all">
        </div>

        <div id="ticketContainer" class="space-y-4">
            <p class="text-center text-slate-500 py-10">Memuat data request...</p>
        </div>
    </div>

    <script>
        // MASUKKAN URL APLIKASI WEB KAMU DI SINI!
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnDCjJMFOx5RA8XSA_VLigDlJFl7Io5l4b5uO00QsoZUHCkLDDQJ4mT7hybVDG1C0P5g/exec';
        let allTickets = []; 

        async function fetchData() {
            const container = document.getElementById('ticketContainer');
            container.innerHTML = '<p class="text-center text-slate-500 py-10 animate-pulse">Sedang mengambil data terbaru...</p>';
            try {
                const response = await fetch(SCRIPT_URL);
                allTickets = await response.json(); 
                renderTickets(allTickets); 
            } catch (error) {
                container.innerHTML = '<p class="text-center text-red-500 font-medium py-10">Gagal mengambil data.</p>';
            }
        }

        function renderTickets(data) {
            const container = document.getElementById('ticketContainer');
            container.innerHTML = ''; 

            if(data.length === 0) {
                container.innerHTML = '<div class="text-center bg-white p-10 rounded-xl border border-slate-200 text-slate-500 shadow-sm">Tidak ada tiket.</div>';
                return;
            }

            data.forEach(tiket => {
                let itemsHTML = '';
                tiket.items.forEach(item => {
                    let statusColor = 'bg-amber-100 text-amber-800'; 
                    if(item.status.toLowerCase() === 'diproses') statusColor = 'bg-blue-100 text-blue-800';
                    if(item.status.toLowerCase() === 'selesai') statusColor = 'bg-emerald-100 text-emerald-800';

                    // ----------------------------------------------------
                    // PERBAIKAN FORMAT ESTIMASI (HILANGKAN JAM)
                    // ----------------------------------------------------
                    let estimasiTampil = item.estimasi || '-';
                    if (typeof estimasiTampil === 'string' && estimasiTampil.includes('T') && estimasiTampil.includes('Z')) {
                        let parsedDate = new Date(estimasiTampil);
                        if (!isNaN(parsedDate)) {
                            // Mengubah ke format lokal (contoh: 14/11/2026)
                            estimasiTampil = parsedDate.toLocaleDateString('id-ID'); 
                        }
                    }

                    itemsHTML += `
                        <tr class="border-b last:border-0 hover:bg-slate-50 transition-colors">
                            <td class="py-3 px-4 font-medium text-slate-700">${item.namaBarang}</td>
                            <td class="py-3 px-4 text-slate-600">${item.qty}</td>
                            <td class="py-3 px-4 text-slate-600">${item.harga !== '-' ? 'Rp '+item.harga : '-'}</td>
                            <td class="py-3 px-4 text-slate-600">${item.vendor}</td>
                            <td class="py-3 px-4 text-slate-600">${estimasiTampil}</td>
                            <td class="py-3 px-4 text-slate-600">
                                <span class="px-2.5 py-1 text-[11px] uppercase tracking-wider font-bold rounded-full ${statusColor}">${item.status}</span>
                            </td>
                            <td class="py-3 px-4 text-right">
                                <button onclick="editItem('${tiket.ticketId}', '${item.namaBarang}', '${item.harga}', '${item.vendor}', '${item.status}','${estimasiTampil}')" class="text-blue-600 hover:text-blue-800 font-medium text-sm bg-blue-50 px-3 py-1 rounded-md transition-colors">✏️ Edit</button>
                            </td>
                        </tr>
                    `;
                });

                const detailId = `detail-${tiket.ticketId}`;
                const iconId = `icon-${tiket.ticketId}`;
                
                let imgHTML = '';
                if (tiket.imageUrl && tiket.imageUrl !== '-') {
                    imgHTML = `<a href="${tiket.imageUrl}" target="_blank" onclick="event.stopPropagation()" class="text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg text-sm font-medium mr-2">📷 Bukti</a>`;
                }

                const cardHTML = `
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div onclick="toggleDetail('${detailId}', '${iconId}')" class="bg-white p-5 flex flex-col md:flex-row justify-between items-start md:items-center cursor-pointer select-none group">
                            <div class="flex-1 w-full">
                                <div class="flex items-center justify-between md:justify-start gap-3">
                                    <h3 class="text-lg font-bold text-slate-800">${tiket.ticketId}</h3>
                                </div>
                                <div class="text-sm text-slate-500 mt-2 flex flex-wrap gap-x-4 gap-y-1">
                                    <span>👤 ${tiket.requester}</span>
                                    <span>📍 ${tiket.area}</span>
                                    <span>📅 Req: ${new Date(tiket.tglReq).toLocaleDateString('id-ID')}</span>
                                </div>
                            </div>
                            <div class="flex items-center mt-4 md:mt-0 gap-2">
                                ${imgHTML}
                                <button onclick="hapusTiket(event, '${tiket.ticketId}')" class="text-red-600 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors mr-3">🗑️ Hapus Tiket</button>
                                <span id="${iconId}" class="text-slate-400 transform transition-transform duration-300">▼</span>
                            </div>
                        </div>
                        
                        <div id="${detailId}" class="hidden border-t border-slate-100 bg-slate-50">
                            <div class="overflow-x-auto p-4 md:p-5">
                                <table class="w-full text-left text-sm whitespace-nowrap bg-white border border-slate-200 rounded-lg overflow-hidden">
                                    <thead class="bg-slate-100 text-slate-600 border-b border-slate-200">
                                        <tr>
                                            <th class="py-3 px-4 font-semibold text-xs uppercase">Barang</th>
                                            <th class="py-3 px-4 font-semibold text-xs uppercase">Qty</th>
                                            <th class="py-3 px-4 font-semibold text-xs uppercase">Harga</th>
                                            <th class="py-3 px-4 font-semibold text-xs uppercase">Vendor</th>
                                            <th class="py-3 px-4 font-semibold text-xs uppercase">Estimasi</th>
                                            <th class="py-3 px-4 font-semibold text-xs uppercase">Status</th>
                                            <th class="py-3 px-4 font-semibold text-xs uppercase text-right">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${itemsHTML}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        function toggleDetail(detailId, iconId) {
            const detailDiv = document.getElementById(detailId);
            const iconSpan = document.getElementById(iconId);
            if (detailDiv.classList.contains('hidden')) {
                detailDiv.classList.remove('hidden');
                iconSpan.style.transform = 'rotate(180deg)';
            } else {
                detailDiv.classList.add('hidden');
                iconSpan.style.transform = 'rotate(0deg)';
            }
        }

        // FUNGSI UNTUK MENGHAPUS TIKET
        function hapusTiket(event, ticketId) {
            event.stopPropagation(); // Mencegah dropdown terbuka saat tombol hapus diklik
            
            Swal.fire({
                title: 'Hapus Tiket?',
                text: `Tiket ${ticketId} dan semua barangnya akan dihapus permanen!`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: 'Ya, Hapus!'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({title: 'Menghapus...', allowOutsideClick: false, didOpen: () => {Swal.showLoading()}});
                    
                    try {
                        const response = await fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'delete_ticket', ticketId: ticketId })
                        });
                        const res = await response.json();
                        if(res.status === 'sukses') {
                            Swal.fire('Terhapus!', 'Tiket berhasil dihapus.', 'success');
                            fetchData(); // Refresh data
                        }
                    } catch(err) {
                        Swal.fire('Error', 'Gagal menghapus tiket.', 'error');
                    }
                }
            });
        }

        // FUNGSI UNTUK MENGEDIT BARANG
        function editItem(ticketId, namaBarang, currentHarga, currentVendor, currentStatus, currentEstimasi) {
            Swal.fire({
                title: `Edit ${namaBarang}`,
                html: `
                    <div class="text-left space-y-3 mt-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700">Harga Satuan</label>
                            <input id="swal-harga" type="number" class="w-full p-2 border rounded-md" value="${currentHarga !== '-' && currentHarga !== 'undefined' ? currentHarga : ''}" placeholder="Cth: 50000">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700">Nama Vendor</label>
                            <input id="swal-vendor" type="text" class="w-full p-2 border rounded-md" value="${currentVendor !== '-' && currentVendor !== 'undefined' ? currentVendor : ''}" placeholder="Cth: Toko Makmur">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700">Estimasi Tiba / Selesai</label>
                            <input id="swal-estimasi" type="text" class="w-full p-2 border rounded-md" value="${currentEstimasi !== '-' && currentEstimasi !== 'undefined' ? currentEstimasi : ''}" placeholder="Cth: 14/11/2026 atau 2 Hari lagi">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700">Status Barang</label>
                            <select id="swal-status" class="w-full p-2 border rounded-md">
                                <option value="Menunggu" ${currentStatus === 'Menunggu' ? 'selected' : ''}>Menunggu</option>
                                <option value="Diproses" ${currentStatus === 'Diproses' ? 'selected' : ''}>Diproses</option>
                                <option value="Selesai" ${currentStatus === 'Selesai' ? 'selected' : ''}>Selesai</option>
                            </select>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Simpan',
                confirmButtonColor: '#2563eb',
                preConfirm: () => {
                    return {
                        harga: document.getElementById('swal-harga').value || '-',
                        vendor: document.getElementById('swal-vendor').value || '-',
                        estimasi: document.getElementById('swal-estimasi').value || '-',
                        status: document.getElementById('swal-status').value
                    }
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => {Swal.showLoading()}});
                    
                    const payload = {
                        action: 'update_item',
                        ticketId: ticketId,
                        namaBarang: namaBarang,
                        harga: result.value.harga,
                        vendor: result.value.vendor,
                        estimasi: result.value.estimasi,
                        status: result.value.status
                    };

                    try {
                        const response = await fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify(payload)
                        });
                        const res = await response.json();
                        if(res.status === 'sukses') {
                            Swal.fire('Tersimpan!', 'Data barang berhasil diperbarui.', 'success');
                            fetchData(); // Refresh data agar perubahan terlihat
                        } else {
                            Swal.fire('Gagal', 'Sistem tidak dapat memperbarui data.', 'error');
                        }
                    } catch(err) {
                        Swal.fire('Error', 'Terjadi kesalahan jaringan.', 'error');
                    }
                }
            });
        }

        // Fitur Search
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const filteredTickets = allTickets.filter(tiket => {
                return tiket.ticketId.toLowerCase().includes(keyword) || 
                       tiket.requester.toLowerCase().includes(keyword) || 
                       tiket.area.toLowerCase().includes(keyword);
            });
            renderTickets(filteredTickets);
        });

        fetchData();
    </script>
</body>
</html>
